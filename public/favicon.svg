<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Circular background for PWA/App Icon (Optional - remove the circle below if you want a transparent background) -->
  <!-- <circle cx="50" cy="50" r="48" fill="#eff4f8" /> -->

  <g id="venue-mind-favicon">
    <!-- Hexagon Outline -->
    <polygon points="50,15 84.6,35 84.6,75 50,95 15.4,75 15.4,35" fill="none" stroke="#102a43" stroke-width="5" stroke-linejoin="round" />
    
    <!-- All Inner Lines (Corrected to Blue) -->
    <g stroke="#00a4d3" stroke-width="4" stroke-linecap="round">
      <line x1="50" y1="55" x2="50" y2="28" />
      <line x1="50" y1="55" x2="50" y2="82" />
      <line x1="50" y1="55" x2="73.4" y2="41.5" />
      <line x1="50" y1="55" x2="73.4" y2="68.5" />
      <line x1="50" y1="55" x2="26.6" y2="41.5" />
      <line x1="50" y1="55" x2="26.6" y2="68.5" />
    </g>
    
    <!-- All Outer Nodes (Corrected to Blue) -->
    <g fill="#00a4d3">
      <circle cx="50" cy="28" r="4" />
      <circle cx="50" cy="82" r="4" />
      <circle cx="73.4" cy="41.5" r="4" />
      <circle cx="73.4" cy="68.5" r="4" />
      <circle cx="26.6" cy="41.5" r="4" />
      <circle cx="26.6" cy="68.5" r="4" />
    </g>
    
    <!-- Center Node -->
    <circle cx="50" cy="55" r="9" fill="#00a4d3" />
  </g>
</svg>

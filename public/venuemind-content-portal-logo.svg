<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 150" width="100%" height="100%">
  <!-- Icon Group -->
  <g id="venue-mind-icon" transform="translate(10, 0)">
    <!-- Hexagon Outline -->
    <polygon points="50,35 84.6,55 84.6,95 50,115 15.4,95 15.4,55" fill="none" stroke="#102a43" stroke-width="4" stroke-linejoin="round" />
    
    <!-- All Inner Lines set to Blue -->
    <g stroke="#00a4d3" stroke-width="3" stroke-linecap="round">
      <line x1="50" y1="75" x2="50" y2="48" />
      <line x1="50" y1="75" x2="50" y2="102" />
      <line x1="50" y1="75" x2="73.4" y2="61.5" />
      <line x1="50" y1="75" x2="73.4" y2="88.5" />
      <line x1="50" y1="75" x2="26.6" y2="61.5" />
      <line x1="50" y1="75" x2="26.6" y2="88.5" />
    </g>
    
    <!-- All Outer Nodes set to Blue -->
    <g fill="#00a4d3">
      <circle cx="50" cy="48" r="3.5" />
      <circle cx="50" cy="102" r="3.5" />
      <circle cx="73.4" cy="61.5" r="3.5" />
      <circle cx="73.4" cy="88.5" r="3.5" />
      <circle cx="26.6" cy="61.5" r="3.5" />
      <circle cx="26.6" cy="88.5" r="3.5" />
    </g>
    
    <!-- Center Node -->
    <circle cx="50" cy="75" r="8" fill="#00a4d3" />
  </g>

  <!-- Typography Group -->
  <g id="venue-mind-text" transform="translate(115, 0)">
    <text x="0" y="85" font-family="'Montserrat', sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">
      <tspan fill="#102a43">Venue</tspan><tspan fill="#00a4d3">Mind</tspan>
    </text>
    
    <line x1="265" y1="45" x2="265" y2="90" stroke="#d9e2ec" stroke-width="1.5" />
    
    <text x="285" y="82" font-family="sans-serif" font-size="32" font-weight="400" fill="#627d98">Content Portal</text>
    
    <text x="4" y="112" font-family="'Montserrat', sans-serif" font-size="12" font-weight="600" fill="#829ab1" letter-spacing="0.32em">AI-NATIVE VENUE INTELLIGENCE</text>
  </g>
</svg>
